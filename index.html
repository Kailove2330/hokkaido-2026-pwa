<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2744" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="北海道 2026" />
  <title>北海道 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css?v=38" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>北海道 2026</h1>
      <button id="lang-toggle">EN</button>
    </header>

    <main>
      <section class="page" id="page-itinerary"></section>
      <section class="page" id="page-souvenirs"></section>
      <section class="page" id="page-transport"></section>
      <section class="page" id="page-checklist"></section>
      <section class="page" id="page-sos"></section>
    </main>

    <nav id="bottom-nav"></nav>

    <!-- Item Edit Sheet -->
    <div id="edit-sheet-overlay" style="display:none">
      <div id="edit-sheet">
        <div class="edit-sheet-title" id="edit-sheet-title">編輯行程項目</div>
        <div class="edit-field">
          <label class="edit-label" id="lbl-place">地點名稱</label>
          <input id="edit-place" type="text" placeholder="地點名稱" class="edit-input">
        </div>
        <div class="edit-field">
          <label class="edit-label" id="lbl-time">時間</label>
          <input id="edit-time" type="text" placeholder="HH:MM" maxlength="5" class="edit-input">
        </div>
        <div class="edit-field">
          <label class="edit-label" id="lbl-dur">停留時間</label>
          <input id="edit-duration" type="text" placeholder="60min" class="edit-input">
        </div>
        <div class="edit-field">
          <label class="edit-label" id="lbl-note">備注</label>
          <textarea id="edit-note" rows="3" class="edit-textarea"></textarea>
        </div>
        <input type="hidden" id="edit-item-id">
        <div class="edit-sheet-btns">
          <button class="edit-save-btn" onclick="saveItemEdit()">儲存</button>
          <button class="edit-cancel-btn" onclick="closeEditSheet()">取消</button>
        </div>
      </div>
    </div>

    <!-- Leaflet Map Modal -->
    <div id="map-modal" style="display:none">
      <div id="map-modal-bar">
        <span id="map-modal-title"></span>
        <button id="map-modal-close" onclick="closeMapModal()">✕</button>
      </div>
      <div id="map-leaflet"></div>
    </div>

    <!-- Place Detail Sheet -->
    <div id="detail-sheet-overlay" style="display:none" onclick="closeDetailSheet()">
      <div id="detail-sheet" onclick="event.stopPropagation()">
        <div class="detail-sheet-header">
          <div class="detail-sheet-title" id="detail-sheet-title"></div>
          <button class="detail-sheet-close" onclick="closeDetailSheet()">✕</button>
        </div>
        <div id="detail-sheet-body"></div>
      </div>
    </div>

    <!-- Move-to-day bottom sheet -->
    <div id="move-sheet-overlay" style="display:none">
      <div id="move-sheet">
        <div id="move-sheet-title" class="move-sheet-title">移到哪一天？</div>
        <div id="move-day-list" class="move-day-list"></div>
        <button id="move-sheet-cancel" class="move-sheet-cancel">取消</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js?v=38"></script>
  <script src="js/state.js?v=38"></script>
  <script src="js/impact.js?v=38"></script>
  <script src="js/app.js?v=38"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
