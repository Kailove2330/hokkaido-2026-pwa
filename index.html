<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2744" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="北海道 2026" />
  <title>北海道 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>北海道 2026</h1>
      <button id="lang-toggle">EN</button>
    </header>

    <main>
      <!-- Tab 0: Itinerary -->
      <section class="page" id="page-itinerary"></section>

      <!-- Tab 1: Souvenirs -->
      <section class="page" id="page-souvenirs"></section>

      <!-- Tab 2: Transport -->
      <section class="page" id="page-transport"></section>

      <!-- Tab 3: Before Departure Checklist -->
      <section class="page" id="page-checklist"></section>

      <!-- Tab 4: SOS -->
      <section class="page" id="page-sos"></section>
    </main>

    <nav id="bottom-nav"></nav>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
