<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2744" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="北海道 2026" />
  <title>北海道 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>北海道 2026</h1>
      <button id="lang-toggle">EN</button>
    </header>

    <main>
      <section class="page" id="page-itinerary"></section>
      <section class="page" id="page-souvenirs"></section>
      <section class="page" id="page-transport"></section>
      <section class="page" id="page-checklist"></section>
      <section class="page" id="page-sos"></section>
    </main>

    <nav id="bottom-nav"></nav>

    <!-- Move-to-day bottom sheet -->
    <div id="move-sheet-overlay" style="display:none">
      <div id="move-sheet">
        <div id="move-sheet-title" class="move-sheet-title">移到哪一天？</div>
        <div id="move-day-list" class="move-day-list"></div>
        <button id="move-sheet-cancel" class="move-sheet-cancel">取消</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/impact.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
